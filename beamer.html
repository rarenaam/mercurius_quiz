<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercurius – Beamer Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060b18;
      --surface:   #0e1629;
      --surface2:  #131f38;
      --border:    #1e2d4d;
      --accent:    #4f8ef7;
      --accent2:   #a78bfa;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --font-ui:   'Space Grotesk', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --kh-red:    #e21b3c;
      --kh-blue:   #1368ce;
      --kh-yellow: #d89e00;
      --kh-green:  #26890c;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* ── Sterrenhemel ──────────────────────────────────────────────── */
    #sterren {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .ster {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50%       { opacity: var(--op, 0.7); }
    }

    /* Grote, trage nevel-bollen op de achtergrond */
    .nevel {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      animation: nebelDrift var(--nd, 20s) ease-in-out infinite alternate;
    }
    @keyframes nebelDrift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(var(--dx, 20px), var(--dy, 15px)) scale(1.05); }
    }

    /* ── Inhoud boven sterren ───────────────────────────────────────── */
    .beamer-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .vraag-titel {
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.3;
      min-height: 72px;
      color: white;
      text-shadow: 0 2px 20px rgba(79, 142, 247, 0.4);
    }

    /* ── Antwoordgrid ──────────────────────────────────────────────── */
    .antwoord-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.1rem;
      width: 100%;
    }

    .vlak {
      padding: 1.75rem;
      border-radius: 0.85rem;
      color: white;
      font-weight: 700;
      text-align: left;
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      opacity: 0.9;
      border: 5px solid transparent;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      /* Subtiele glinstering boven de kleur */
      background-clip: padding-box;
    }

    .vlak.correct {
      border-color: white;
      opacity: 1;
      box-shadow: 0 0 40px rgba(255,255,255,0.3);
      transform: scale(1.02);
    }

    .vlak.incorrect {
      opacity: 0.18;
      transform: scale(0.98);
      filter: blur(1px);
    }

    .v1 { background: var(--kh-red);    box-shadow: 0 4px 20px rgba(226,27,60,0.35); }
    .v2 { background: var(--kh-blue);   box-shadow: 0 4px 20px rgba(19,104,206,0.35); }
    .v3 { background: var(--kh-yellow); box-shadow: 0 4px 20px rgba(216,158,0,0.35); }
    .v4 { background: var(--kh-green);  box-shadow: 0 4px 20px rgba(38,137,12,0.35); }

    /* ── Grafiek ───────────────────────────────────────────────────── */
    .chart-box {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      background: rgba(14, 22, 41, 0.85);
      backdrop-filter: blur(8px);
      padding: 1.25rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* ── Podium ────────────────────────────────────────────────────── */
    @keyframes growPodium {
      from { height: 0; }
    }

    .podium-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1.5rem;
      margin: 1.5rem auto 0;
      height: 230px;
      width: 100%;
      max-width: 600px;
    }

    .podium-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      text-align: center;
    }

    .podium-bar {
      width: 100%;
      border-top-left-radius: 0.8rem;
      border-top-right-radius: 0.8rem;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.2rem;
      font-weight: bold;
      color: #02060f;
      animation: growPodium 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .podium-1 { height: 165px; background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 0 35px rgba(245,158,11,0.5); }
    .podium-2 { height: 115px; background: linear-gradient(135deg, #cbd5e1, #94a3b8); }
    .podium-3 { height: 80px;  background: linear-gradient(135deg, #b45309, #78350f); }

    .podium-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    .podium-score {
      font-size: 1rem;
      font-family: var(--font-mono);
      color: var(--accent2);
      margin-top: 0.4rem;
      font-weight: 700;
    }

    /* ── Footer ────────────────────────────────────────────────────── */
    .beamer-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      width: 100%;
    }

    .timer {
      font-size: 2rem;
      font-family: var(--font-mono);
      color: var(--accent);
      font-weight: 700;
      transition: color 0.3s;
      min-width: 80px;
      text-align: left;
    }

    .timer.kritiek {
      color: var(--kh-red);
      animation: timerKnip 0.5s ease-in-out infinite;
    }

    @keyframes timerKnip {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .teller     { font-size: 1.1rem; color: var(--muted); font-weight: 500; }
    .lobby-code { font-size: 1.3rem; font-weight: 600; color: var(--accent2); min-width: 80px; text-align: right; }
    /* ── Zon ───────────────────────────────────────────────────────── */
    #zon-canvas {
      position: fixed;
      bottom: -120px;
      right: -80px;
      width: 420px;
      height: 420px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }
  </style>
</head>
<body>

<!-- Sterrenhemel achtergrond -->
<div id="sterren"></div>

<!-- Gloeiende zon rechtsonder -->
<canvas id="zon-canvas"></canvas>

<div class="beamer-container">
  <div class="vraag-titel" id="display-vraag">Wachten op de quizmaster…</div>

  <div class="antwoord-grid" id="display-grid">
    <div class="vlak v1" id="optie0">▲ Rood vlak</div>
    <div class="vlak v2" id="optie1">⬢ Blauw vlak</div>
    <div class="vlak v3" id="optie2">● Geel vlak</div>
    <div class="vlak v4" id="optie3">■ Groen vlak</div>
  </div>

  <div class="chart-box" id="chart-box" style="display:none;">
    <canvas id="uitslagChart"></canvas>
  </div>

  <div id="podium-view" style="display:none; flex-direction:column; align-items:center; width:100%;"></div>

  <div class="beamer-footer">
    <div class="timer" id="display-timer"></div>
    <div class="teller" id="display-teller"></div>
    <div class="lobby-code" id="display-lobby-info"></div>
  </div>
</div>

<script>
  /* ── Sterrenhemel genereren ──────────────────────────────────────── */
  (function maakSterren() {
    const container = document.getElementById("sterren");

    // Nevels (grote, vage gloeiende bollen)
    const nevels = [
      { w: 500, h: 400, top: "5%",  left: "60%", kleur: "rgba(79,142,247,0.06)",  nd: "25s", dx: "30px",  dy: "20px" },
      { w: 400, h: 350, top: "50%", left: "5%",  kleur: "rgba(167,139,250,0.05)", nd: "30s", dx: "-20px", dy: "25px" },
      { w: 300, h: 300, top: "70%", left: "70%", kleur: "rgba(79,142,247,0.04)",  nd: "20s", dx: "15px",  dy: "-20px" },
    ];

    nevels.forEach(n => {
      const el = document.createElement("div");
      el.className = "nevel";
      el.style.cssText = `
        width:${n.w}px; height:${n.h}px;
        top:${n.top}; left:${n.left};
        background:${n.kleur};
        --nd:${n.nd}; --dx:${n.dx}; --dy:${n.dy};
      `;
      container.appendChild(el);
    });

    // Sterren (veel meer op een beamerscherm)
    for (let i = 0; i < 220; i++) {
      const s = document.createElement("div");
      s.className = "ster";
      const size = Math.random() * 2.8 + 0.4;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random() * 100}%; left:${Math.random() * 100}%;
        --d:${(Math.random() * 5 + 2).toFixed(1)}s;
        --op:${(Math.random() * 0.7 + 0.2).toFixed(2)};
        animation-delay:${(Math.random() * 6).toFixed(1)}s;
      `;
      container.appendChild(s);
    }
  })();

  /* ── State ──────────────────────────────────────────────────────── */
  let ws;
  let countdownInterval;
  let chartInstance = null;
  let actieveTijdLimiet = 0;

  /* ── WebSocket Verbinding ───────────────────────────────────────── */
  function verbinden() {
    const protocol = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${protocol}//${location.host}/ws/beamer`);

    ws.onopen  = () => console.log("Beamer verbonden.");
    ws.onmessage = (e) => {
      try { verwerkBericht(JSON.parse(e.data)); }
      catch(err) { console.error("Ongeldig bericht:", err); }
    };
    ws.onclose = () => {
      clearInterval(countdownInterval);
      setTimeout(verbinden, 2000);
    };
  }

  /* ── Berichtenverwerking ────────────────────────────────────────── */
  function verwerkBericht(data) {

    if (data.actie === "status_update") {
      if (data.status === "lobby") {
        document.getElementById("display-vraag").textContent = "🚀 Welkom bij Mercurius Quiz! 🔭";
        document.getElementById("display-lobby-info").textContent = `${location.host}`;
        document.getElementById("display-teller").textContent = `Deelnemers in lobby: ${data.spelers.length}`;
        document.getElementById("display-grid").style.display  = "grid";
        document.getElementById("chart-box").style.display     = "none";
        document.getElementById("podium-view").style.display   = "none";
        document.getElementById("display-timer").textContent   = "";
        document.getElementById("display-timer").classList.remove("kritiek");
        resetVlakken();
      }

      if (data.status === "vraag_actief") {
        document.getElementById("display-teller").textContent =
          `Antwoorden: ${data.aantal_antwoorden} / ${data.spelers.length}`;
      }
    }

    if (data.actie === "toon_vraag") {
      clearInterval(countdownInterval);
      actieveTijdLimiet = Number(data.tijd);

      document.getElementById("display-grid").style.display  = "grid";
      document.getElementById("chart-box").style.display     = "none";
      document.getElementById("podium-view").style.display   = "none";
      document.getElementById("display-lobby-info").textContent = "";
      resetVlakken();

      document.getElementById("display-vraag").textContent  = data.vraag;
      document.getElementById("optie0").textContent = "▲ " + (data.opties[0] || "");
      document.getElementById("optie1").textContent = "⬢ " + (data.opties[1] || "");
      document.getElementById("optie2").textContent = "● " + (data.opties[2] || "");
      document.getElementById("optie3").textContent = "■ " + (data.opties[3] || "");

      setTimer(`⌛ ${actieveTijdLimiet}s`, false);
      document.getElementById("display-teller").textContent = "Bereid je voor…";
    }

    if (data.actie === "timer_loopt") {
      let seconden = actieveTijdLimiet;
      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        seconden--;
        setTimer(`${seconden}s`, seconden <= 5);
        if (seconden <= 0) clearInterval(countdownInterval);
      }, 1000);
    }

    if (data.actie === "vraag_uitslag") {
      clearInterval(countdownInterval);
      setTimer("🛑", false);
      document.getElementById("display-teller").textContent = "Ronde afgelopen!";

      document.querySelectorAll('.vlak').forEach((v, idx) => {
        v.classList.remove('correct', 'incorrect');
        v.classList.add(idx === data.correct_index ? 'correct' : 'incorrect');
      });

      const counts = [0, 0, 0, 0];
      if (data.antwoorden) {
        Object.values(data.antwoorden).forEach(a => {
          if (a.optie >= 0 && a.optie <= 3) counts[a.optie]++;
        });
      }
      tekenGrafiek(counts);
    }

    if (data.actie === "eind_uitslag") {
      clearInterval(countdownInterval);
      document.getElementById("display-vraag").textContent = "👑 Eindresultaat Podium 👑";
      setTimer("", false);
      document.getElementById("display-teller").textContent = "";
      document.getElementById("display-grid").style.display  = "none";
      document.getElementById("chart-box").style.display     = "none";

      const podiumView = document.getElementById("podium-view");
      podiumView.style.display = "flex";
      podiumView.innerHTML = bouwPodiumHtml(data.ranking);

      confetti({ particleCount: 180, spread: 90, origin: { y: 0.6 } });
    }
  }

  /* ── Timer Helper ───────────────────────────────────────────────── */
  function setTimer(tekst, kritiek) {
    const el = document.getElementById("display-timer");
    el.textContent = tekst;
    el.classList.toggle("kritiek", kritiek);
  }

  /* ── Podium HTML Builder ────────────────────────────────────────── */
  function bouwPodiumHtml(ranking) {
    if (!ranking || !ranking.length) return `<p style="color:var(--muted)">Geen deelnemers</p>`;

    const plekken = [
      { data: ranking[1], klasse: "podium-2", icon: "🥈", order: 1 },
      { data: ranking[0], klasse: "podium-1", icon: "🥇", order: 2 },
      { data: ranking[2], klasse: "podium-3", icon: "🥉", order: 3 },
    ];

    let html = '<div class="podium-container">';
    plekken.forEach(({ data, klasse, icon, order }) => {
      if (!data) return;
      html += `
        <div class="podium-column" style="order:${order}">
          <div class="podium-name" title="${esc(data.naam)}">${esc(data.naam)}</div>
          <div class="podium-bar ${klasse}">${icon}</div>
          <div class="podium-score">${data.score} pt</div>
        </div>`;
    });
    html += "</div>";

    // Plek 4 & 5
    if (ranking.length > 3) {
      html += '<div style="margin-top:1.25rem; width:100%; max-width:420px; display:flex; flex-direction:column; gap:0.4rem;">';
      ranking.slice(3, 5).forEach((s, i) => {
        html += `
          <div style="display:flex; justify-content:space-between; background:rgba(14,22,41,0.8); backdrop-filter:blur(6px); padding:0.5rem 1rem; border-radius:0.5rem; font-size:1rem; border:1px solid var(--border);">
            <span style="font-weight:600;">#${i + 4} ${esc(s.naam)}</span>
            <span style="color:var(--accent2); font-weight:700; font-family:var(--font-mono);">${s.score} pt</span>
          </div>`;
      });
      html += "</div>";
    }

    return html;
  }

  /* ── Chart.js ───────────────────────────────────────────────────── */
  function tekenGrafiek(counts) {
    document.getElementById("chart-box").style.display = "block";
    const ctx = document.getElementById("uitslagChart").getContext("2d");
    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["▲ Rood", "⬢ Blauw", "● Geel", "■ Groen"],
        datasets: [{
          data: counts,
          backgroundColor: ["#e21b3c", "#1368ce", "#d89e00", "#26890c"],
          borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1, color: "#64748b" },
            grid: { color: "#1e2d4d" }
          },
          x: {
            ticks: { color: "#e2e8f0", font: { weight: "bold", size: 14 } },
            grid: { display: false }
          }
        }
      }
    });
  }

  /* ── Helpers ────────────────────────────────────────────────────── */
  function resetVlakken() {
    document.querySelectorAll('.vlak').forEach(v => v.classList.remove('correct', 'incorrect'));
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

    frame();
  })();

  verbinden();
</script>
</body>
</html>
